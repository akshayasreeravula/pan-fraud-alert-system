<!DOCTYPE html>
<html>
<head>
<title>FinShield Non User Portal</title>
<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:0;
}
.container{
width:600px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{
text-align:center;
color:#2c7a4b;
}
input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}
button{
background:#2c7a4b;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
}
.result{
margin-top:20px;
padding:10px;
background:#eef7f1;
}
</style>
</head>

<body>

<div class="container">

<h2>Registration</h2>

<h3>Upload PAN</h3>

<input type="file" id="panfile">
<input type="text" id="mobile" placeholder="Mobile Number">
<input type="text" id="email" placeholder="Email">

<button onclick="uploadPAN()">Submit PAN</button>

<div class="result" id="result"></div>

</div>

<script>

async function uploadPAN(){

let file=document.getElementById("panfile").files[0]
let mobile=document.getElementById("mobile").value
let email=document.getElementById("email").value

let formData=new FormData()
formData.append("file",file)
formData.append("mobile",mobile)
formData.append("email",email)

let res=await fetch("http://127.0.0.1:8000/upload-pan",{
method:"POST",
body:formData
})

let data=await res.json()

document.getElementById("result").innerHTML=
"PAN Detected: "+data.pan+"<br>Verification Token: "+data.token

}

</script>

</body>
</html>
